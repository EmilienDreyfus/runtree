name: Feature request
description: Propose a product or workflow improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is blocked or inefficient today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want in runtree.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Share constraints, alternatives considered, or related tools.
